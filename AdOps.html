<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web広告運用アシスタント</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
        }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .tab-active {
            background-color: #eff6ff;
            color: #2563eb;
            border-right: 3px solid #2563eb;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-gray-800">

    <!-- サイドバー -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 z-10 shadow-sm">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="flex items-center gap-2 text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span class="font-bold text-lg tracking-tight text-gray-900">AdOps<span class="text-blue-600">Assist</span></span>
            </div>
        </div>
        
        <nav class="flex-1 py-4 flex flex-col gap-1">
            <button class="nav-btn tab-active flex items-center gap-3 px-6 py-3 text-sm font-medium hover:bg-gray-50 transition-colors text-left text-blue-600" data-target="utm">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                UTMパラメータ生成
            </button>
            <button class="nav-btn flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors text-left" data-target="fee">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                手数料計算
            </button>
            <button class="nav-btn flex items-center gap-3 px-6 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors text-left" data-target="adcopy">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                広告文生成
            </button>
        </nav>

        <div class="p-4 border-t border-gray-100 text-xs text-gray-400 text-center">
            自動保存有効
        </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 overflow-y-auto relative bg-gray-50/50">
        
        <!-- ツール1: UTMパラメータ -->
        <div id="view-utm" class="view-section p-8 max-w-4xl mx-auto h-full">
            <h2 class="text-2xl font-bold mb-2">UTMパラメータ一括ビルダー</h2>
            <p class="text-gray-500 mb-8 text-sm">広告の遷移先URLにトラッキング用のパラメータを正確に付与します。</p>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-medium text-gray-700 mb-1">ベースURL <span class="text-red-500">*</span></label>
                        <input type="url" id="utm-url" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://example.com/lp">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Campaign Source (参照元) <span class="text-red-500">*</span></label>
                        <div class="relative pb-6">
                            <input type="text" id="utm-source" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none mb-1" placeholder="例: google, meta, yahoo">
                            <div class="flex flex-wrap gap-1 mt-1">
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-source').value='google'; generateUTM()">Google</button>
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-source').value='meta'; generateUTM()">Meta</button>
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-source').value='yahoo'; generateUTM()">Yahoo</button>
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-source').value='line'; generateUTM()">LINE</button>
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-source').value='arift'; generateUTM()">ARIFT</button>
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Campaign Medium (メディア) <span class="text-red-500">*</span></label>
                        <div class="relative pb-6">
                            <input type="text" id="utm-medium" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none mb-1" placeholder="例: cpc, display, video">
                            <div class="flex flex-wrap gap-1 mt-1">
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-medium').value='cpc'; generateUTM()">cpc</button>
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-medium').value='display'; generateUTM()">display</button>
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-medium').value='video'; generateUTM()">video</button>
                                <button type="button" class="text-[10px] bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded border border-gray-200 transition-colors" onclick="document.getElementById('utm-medium').value='reels'; generateUTM()">reels</button>
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Campaign Name (キャンペーン名)</label>
                        <input type="text" id="utm-campaign" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例: 2024_spring_sale">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Campaign Term (検索キーワード等)</label>
                        <input type="text" id="utm-term" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例: 広告代理店_東京">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Campaign Content (広告クリエイティブ等)</label>
                        <input type="text" id="utm-content" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例: banner_blue_v1">
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-gray-100">
                    <h3 class="text-sm font-semibold mb-2">生成されたURL</h3>
                    <div class="relative">
                        <textarea id="utm-result" readonly class="w-full h-24 text-sm font-mono bg-gray-50 border border-gray-300 rounded-lg p-3 outline-none resize-none break-all"></textarea>
                        <button id="copy-utm-btn" class="absolute bottom-3 right-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-xs font-medium py-1 px-3 rounded shadow-sm transition-colors flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                            コピー
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ツール2: 手数料計算 -->
        <div id="view-fee" class="view-section hidden p-4 md:p-6 w-full h-full flex flex-col">
            <h2 class="text-xl font-bold mb-1">手数料計算</h2>
            <p class="text-gray-500 mb-4 text-sm">スプレッドシート上で手数料の計算を行います。</p>

            <div class="flex-1 w-full bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <iframe src="https://docs.google.com/spreadsheets/d/1jCflvBOXJTXeb5ukrHkmkiwph0kUpgvN/edit?gid=502505479#gid=502505479" class="w-full h-full" frameborder="0"></iframe>
            </div>
        </div>

        <!-- ツール3: 広告文生成 -->
        <div id="view-adcopy" class="view-section hidden p-8 max-w-4xl mx-auto h-full flex flex-col">
            <h2 class="text-2xl font-bold mb-2">広告文生成 プロンプト作成</h2>
            <p class="text-gray-500 mb-8 text-sm">媒体と商材情報を入力してプロンプトを作成し、専用のAIアシスタント（Gem）に貼り付けてください。</p>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">媒体選択 <span class="text-red-500">*</span></label>
                        <select id="adcopy-platform" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="Meta">Meta</option>
                            <option value="Googleリスティング">Googleリスティング</option>
                            <option value="Googleデマンドジェネレーション">Googleデマンドジェネレーション</option>
                            <option value="Yahoo!リスティング">Yahoo!リスティング</option>
                            <option value="Yahoo!ディスプレイ">Yahoo!ディスプレイ</option>
                            <option value="LINE">LINE</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">商材情報URL <span class="text-red-500">*</span></label>
                        <input type="url" id="adcopy-product-info" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500" placeholder="例: https://example.com/lp">
                        <p class="text-[10px] text-gray-400 mt-1">※URLからページ内のテキストを自動抽出します。（サイトのセキュリティ設定により取得できない場合があります）</p>
                    </div>
                    <button id="adcopy-generate-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg shadow-sm transition-colors mt-2 text-sm flex justify-center items-center">
                        完了
                    </button>
                </div>
            </div>

            <div class="mt-2 pt-6 border-t border-gray-100 flex-1 flex flex-col">
                <div class="relative flex-1 min-h-[150px]">
                    <textarea id="adcopy-result" readonly class="w-full h-full text-sm bg-gray-50 border border-gray-300 rounded-lg p-4 outline-none resize-none"></textarea>
                    <button id="copy-adcopy-btn" class="absolute bottom-3 right-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-xs font-medium py-1 px-3 rounded shadow-sm transition-colors flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        コピー
                    </button>
                </div>

                <div class="mt-6 flex justify-center pb-8">
                    <a href="https://gemini.google.com/gem/1bfpJ6RxLyLQSRGG7gVbD55WHIToqCFYy?usp=sharing" target="_blank" class="inline-flex items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white font-medium py-3 px-6 rounded-lg shadow-md transition-colors text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        AIアシスタント (Gem) を開く
                    </a>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 共通: タブ切り替えとローカルストレージ ---
        const navBtns = document.querySelectorAll('.nav-btn');
        const views = document.querySelectorAll('.view-section');

        // データ保存用オブジェクト
        let adOpsData = JSON.parse(localStorage.getItem('adOpsAssistData')) || {
            utm: {}, adcopy: {}
        };

        function switchTab(targetId) {
            navBtns.forEach(btn => {
                btn.classList.remove('tab-active', 'text-blue-600');
                btn.classList.add('text-gray-600');
                if(btn.dataset.target === targetId) {
                    btn.classList.add('tab-active', 'text-blue-600');
                    btn.classList.remove('text-gray-600');
                }
            });

            views.forEach(view => {
                view.classList.add('hidden');
                if(view.id === `view-${targetId}`) {
                    view.classList.remove('hidden');
                }
            });
        }

        navBtns.forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.target));
        });

        function saveData() {
            localStorage.setItem('adOpsAssistData', JSON.stringify(adOpsData));
        }

        // --- ツール1: UTMパラメータ ---
        const utmInputs = ['url', 'source', 'medium', 'campaign', 'term', 'content'].map(id => document.getElementById(`utm-${id}`));
        const utmResult = document.getElementById('utm-result');

        utmInputs.forEach(input => {
            const key = input.id.replace('utm-', '');
            input.value = adOpsData.utm[key] || '';
            input.addEventListener('input', generateUTM);
        });

        function generateUTM() {
            let baseUrl = document.getElementById('utm-url').value.trim();
            const source = document.getElementById('utm-source').value.trim();
            const medium = document.getElementById('utm-medium').value.trim();
            const campaign = document.getElementById('utm-campaign').value.trim();
            const term = document.getElementById('utm-term').value.trim();
            const content = document.getElementById('utm-content').value.trim();

            adOpsData.utm = { url: baseUrl, source, medium, campaign, term, content };
            saveData();

            if (!baseUrl) {
                utmResult.value = '';
                return;
            }

            try {
                if (!baseUrl.startsWith('http://') && !baseUrl.startsWith('https://')) {
                    baseUrl = 'https://' + baseUrl;
                }
                const urlObj = new URL(baseUrl);
                
                if (source) urlObj.searchParams.set('utm_source', source); else urlObj.searchParams.delete('utm_source');
                if (medium) urlObj.searchParams.set('utm_medium', medium); else urlObj.searchParams.delete('utm_medium');
                if (campaign) urlObj.searchParams.set('utm_campaign', campaign); else urlObj.searchParams.delete('utm_campaign');
                if (term) urlObj.searchParams.set('utm_term', term); else urlObj.searchParams.delete('utm_term');
                if (content) urlObj.searchParams.set('utm_content', content); else urlObj.searchParams.delete('utm_content');

                utmResult.value = urlObj.toString();
            } catch (e) {
                utmResult.value = '無効なURL形式です';
            }
        }

        document.getElementById('copy-utm-btn').addEventListener('click', () => {
            if(utmResult.value && utmResult.value !== '無効なURL形式です') {
                try {
                    utmResult.select();
                    document.execCommand('copy');
                    const btn = document.getElementById('copy-utm-btn');
                    const orig = btn.innerHTML;
                    btn.innerHTML = 'コピー完了✓';
                    btn.classList.add('text-green-600');
                    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('text-green-600'); }, 2000);
                } catch (err) {
                    alert('コピーに失敗しました。');
                }
            }
        });
        generateUTM();

        // --- ツール2: 広告文生成 ---
        const adcopyPlatform = document.getElementById('adcopy-platform');
        const adcopyProductInfo = document.getElementById('adcopy-product-info');
        const adcopyGenerateBtn = document.getElementById('adcopy-generate-btn');
        const adcopyResult = document.getElementById('adcopy-result');

        async function fetchUrlText(url) {
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`
            ];
            let htmlContent = null;

            for (const proxyUrl of proxies) {
                try {
                    const response = await fetch(proxyUrl);
                    if (!response.ok) continue;
                    htmlContent = await response.text();
                    if (htmlContent) break;
                } catch (e) {}
            }

            if (!htmlContent) return `(サイトのセキュリティ設定などにより抽出できませんでした。URL: ${url})`;

            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                const targetElements = doc.querySelectorAll('h1, h2, h3, h4, h5, h6, p');
                let textArray = [];
                targetElements.forEach(el => {
                    const textContent = (el.innerText || el.textContent || '').trim();
                    if (textContent) textArray.push(textContent.replace(/\s+/g, ' '));
                });
                let text = textArray.join('\n');
                if (text.length > 2000) text = text.substring(0, 2000) + '\n...[省略されました]';
                if (!text.trim()) return "(指定されたURLから有効なテキスト要素を抽出できませんでした。)";
                return text;
            } catch (error) {
                return `(抽出したデータの解析に失敗しました。URL: ${url})`;
            }
        }

        adcopyPlatform.value = adOpsData.adcopy.platform || 'Meta';
        adcopyProductInfo.value = adOpsData.adcopy.productInfo || '';
        adcopyResult.value = adOpsData.adcopy.result || '';

        adcopyPlatform.addEventListener('change', () => { adOpsData.adcopy.platform = adcopyPlatform.value; saveData(); });
        adcopyProductInfo.addEventListener('input', () => { adOpsData.adcopy.productInfo = adcopyProductInfo.value; saveData(); });

        adcopyGenerateBtn.addEventListener('click', async () => {
            const platform = adcopyPlatform.value;
            const targetUrl = adcopyProductInfo.value.trim();

            if (!targetUrl) { alert('商材情報URLを入力してください。'); return; }
            try { new URL(targetUrl); } catch (e) { alert('有効なURL形式で入力してください。(例: https://...)'); return; }

            const originalBtnHtml = adcopyGenerateBtn.innerHTML;
            adcopyGenerateBtn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-2 inline-block text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> ページ内容を抽出中...`;
            adcopyGenerateBtn.disabled = true;
            adcopyGenerateBtn.classList.replace('bg-blue-600', 'bg-blue-400');
            adcopyResult.value = 'URLからテキストを抽出しています...';

            const extractedText = await fetchUrlText(targetUrl);
            const resultText = `[媒体]${platform}\n[商材情報]\n${extractedText}`;
            adcopyResult.value = resultText;
            
            adOpsData.adcopy.result = resultText;
            saveData();

            adcopyGenerateBtn.innerHTML = originalBtnHtml;
            adcopyGenerateBtn.disabled = false;
            adcopyGenerateBtn.classList.replace('bg-blue-400', 'bg-blue-600');
        });

        document.getElementById('copy-adcopy-btn').addEventListener('click', () => {
            if(adcopyResult.value) {
                try {
                    adcopyResult.select();
                    document.execCommand('copy');
                    const btn = document.getElementById('copy-adcopy-btn');
                    const orig = btn.innerHTML;
                    btn.innerHTML = 'コピー完了✓';
                    btn.classList.add('text-green-600');
                    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('text-green-600'); }, 2000);
                } catch (err) { alert('コピーに失敗しました。'); }
            }
        });

    </script>
</body>
</html>
